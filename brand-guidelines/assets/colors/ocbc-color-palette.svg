<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1120" width="900" height="1120">
  <rect x="0" y="0" width="900" height="1120" fill="#FFFFFF"/>
  <text x="30" y="45" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#1A1A1A">OCBC Indonesia — Color Palette</text>
  <text x="30" y="72" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#58595B">Reference sheet — see references/02_OCBC_VISUAL_DESIGN_SYSTEM.md for usage rules</text>

  <!-- row template: swatch box x=30 y=Y w=140 h=80 ; text starts x=200 -->

  <g>
    <rect x="30" y="100" width="140" height="80" fill="#ED1C24" stroke="#D9D9D9"/>
    <text x="200" y="128" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">OCBC Red</text>
    <text x="200" y="152" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58595B">#ED1C24 · from logo file (Pantone 485C ≈ #DA291C)</text>
    <text x="200" y="174" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#939598">Primary. Logo, CTAs, key stat callouts. Never as body-text background.</text>
  </g>

  <g>
    <rect x="30" y="200" width="140" height="80" fill="#A31D13" stroke="#D9D9D9"/>
    <text x="200" y="228" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">OCBC Red Deep</text>
    <text x="200" y="252" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58595B">#A31D13</text>
    <text x="200" y="274" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#939598">Gradients, pressed/active states, shadow tint under primary red.</text>
  </g>

  <g>
    <rect x="30" y="300" width="140" height="80" fill="#1A1A1A" stroke="#D9D9D9"/>
    <text x="200" y="328" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">Deep Charcoal</text>
    <text x="200" y="352" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58595B">#1A1A1A</text>
    <text x="200" y="374" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#939598">Primary text on light backgrounds, dark-mode carousel backgrounds.</text>
  </g>

  <g>
    <rect x="30" y="400" width="140" height="80" fill="#0D0D0D" stroke="#D9D9D9"/>
    <text x="200" y="428" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">Near-Black</text>
    <text x="200" y="452" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58595B">#0D0D0D</text>
    <text x="200" y="474" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#939598">Reels/Stories backgrounds, high-contrast dark templates.</text>
  </g>

  <g>
    <rect x="30" y="500" width="140" height="80" fill="#58595B" stroke="#D9D9D9"/>
    <text x="200" y="528" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">Slate Gray</text>
    <text x="200" y="552" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58595B">#58595B</text>
    <text x="200" y="574" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#939598">Secondary text, captions, metadata labels.</text>
  </g>

  <g>
    <rect x="30" y="600" width="140" height="80" fill="#939598" stroke="#D9D9D9"/>
    <text x="200" y="628" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">Cool Gray</text>
    <text x="200" y="652" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58595B">#939598</text>
    <text x="200" y="674" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#939598">Dividers, disabled states, chart gridlines.</text>
  </g>

  <g>
    <rect x="30" y="700" width="140" height="80" fill="#FFFFFF" stroke="#939598" stroke-width="2"/>
    <text x="200" y="728" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">Paper White</text>
    <text x="200" y="752" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58595B">#FFFFFF</text>
    <text x="200" y="774" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#939598">Primary background, negative space, text-on-dark.</text>
  </g>

  <g>
    <rect x="30" y="800" width="140" height="80" fill="#F5F4F2" stroke="#D9D9D9"/>
    <text x="200" y="828" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">Warm Off-White</text>
    <text x="200" y="852" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58595B">#F5F4F2</text>
    <text x="200" y="874" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#939598">Card backgrounds inside carousels, alternate panel fills.</text>
  </g>

  <g>
    <rect x="30" y="900" width="140" height="80" fill="#1E7A46" stroke="#D9D9D9"/>
    <text x="200" y="928" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">Growth Green</text>
    <text x="200" y="952" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58595B">#1E7A46</text>
    <text x="200" y="974" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#939598">Positive figures only (returns, growth %). Never decorative.</text>
  </g>

  <g>
    <rect x="30" y="1000" width="140" height="80" fill="#B8860B" stroke="#D9D9D9"/>
    <text x="200" y="1028" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">Alert Amber</text>
    <text x="200" y="1052" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58595B">#B8860B</text>
    <text x="200" y="1074" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#939598">Risk flags, disclaimers, "read this before you invest" markers.</text>
  </g>
</svg>
